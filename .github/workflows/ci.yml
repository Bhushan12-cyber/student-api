name: Java Spring Boot CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Build & Test ───────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set Up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Cache Maven Packages     # Speeds up pipeline
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 4. Build with Maven
        run: mvn compile

      - name: 5. Run All Tests
        run: mvn test

      - name: 6. Package JAR
        run: mvn package -DskipTests

      - name: 7. Upload JAR as Artifact   # Saves the .jar so next job can use it
        uses: actions/upload-artifact@v3
        with:
          name: student-api-jar
          path: target/*.jar

  # ─── Job 2: Docker Build (only if Job 1 passes) ────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test             # Waits for Job 1 to pass ✅

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Build Docker Image
        run: docker build -t student-api:latest .

      - name: 3. Run Docker Container & Test It
        run: |
          docker run -d -p 8080:8080 --name student-api student-api:latest
          sleep 10
          curl http://localhost:8080/api/students
